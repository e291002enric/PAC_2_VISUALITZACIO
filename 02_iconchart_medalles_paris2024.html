<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Chart — Medalles Olímpiques París 2024</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 24px; }

  #chart-container {
    background: white;
    border-radius: 10px;
    padding: 20px 24px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.1);
  }

  .header { margin-bottom: 16px; }
  h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #555; line-height: 1.5; }
  .source { font-size: 11px; color: #888; margin-top: 4px; }

  /* ── LLEGENDA ── */
  .legend {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #444;
    letter-spacing: 0.02em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .dot-sample {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .gold-dot   { background: #c9a227; }
  .silver-dot { background: #a8a8a8; }
  .bronze-dot { background: #a0623a; }

  .legend-note {
    margin-left: auto;
    font-size: 11px;
    color: #999;
  }

  /* ── FILES DE PAÍS ── */
  .country-row {
    display: grid;
    grid-template-columns: 180px 1fr;
    gap: 0;
    padding: 14px 0;
    border-bottom: 1px solid #ebebeb;
    align-items: start;
  }
  .country-row:last-child { border-bottom: none; }

  .country-info {
    display: flex;
    align-items: center;
    gap: 10px;
    padding-top: 2px;
  }
  .flag { font-size: 20px; line-height: 1; flex-shrink: 0; }
  .country-name { font-size: 13px; font-weight: 600; }
  .rank { font-size: 11px; color: #aaa; margin-top: 1px; }

  /* ── ICONES ── */
  .icons-area {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .medal-group {
    display: flex;
    flex-wrap: wrap;
    gap: 3px;
    align-items: center;
  }

  .medal-icon {
    width: 13px;
    height: 13px;
    border-radius: 50%;
    display: inline-block;
    cursor: default;
    flex-shrink: 0;
    transition: transform 0.1s;
  }
  .medal-icon:hover { transform: scale(1.5); z-index: 10; position: relative; }

  .gold-icon   { background: #c9a227; }
  .silver-icon { background: #a8a8a8; }
  .bronze-icon { background: #a0623a; }

  /* separació visual cada 10 medalles */
  .row-break {
    width: 100%;
    height: 0;
    flex-basis: 100%;
  }

  .group-count {
    font-size: 11px;
    color: #aaa;
    align-self: center;
    min-width: 28px;
    margin-left: 6px;
  }

  .total-label {
    font-size: 11px;
    color: #888;
    margin-top: 4px;
  }
  .total-label strong { color: #333; }

  /* ── TOOLTIP ── */
  .tooltip {
    position: fixed;
    background: #1a1a1a;
    color: #fff;
    padding: 5px 9px;
    border-radius: 4px;
    font-size: 12px;
    pointer-events: none;
    display: none;
    z-index: 999;
    white-space: nowrap;
  }


</style>
</head>
<body>

<div class="header">
  <h1>Icon Chart — Medalles Olímpiques París 2024</h1>
  <div class="subtitle">Top 10 països per or. Cada cercle representa una medalla.</div>
  <div class="source">Font: Wikipedia — 2024 Summer Olympics medal table · Olympics.com</div>
</div>

<div id="chart-container">

<div class="legend">
  <div class="legend-item"><span class="dot-sample gold-dot"></span> Or</div>
  <div class="legend-item"><span class="dot-sample silver-dot"></span> Plata</div>
  <div class="legend-item"><span class="dot-sample bronze-dot"></span> Bronze</div>
  <span class="legend-note">⬤ = 1 medalla</span>
</div>

<div id="chart"></div>


</div><!-- /chart-container -->
<div class="tooltip" id="tooltip"></div>

<script>
const data = [
  { rank: 1,  country: "Estats Units",  flag: "🇺🇸", gold: 40, silver: 44, bronze: 42 },
  { rank: 2,  country: "Xina",          flag: "🇨🇳", gold: 40, silver: 27, bronze: 24 },
  { rank: 3,  country: "Japó",          flag: "🇯🇵", gold: 20, silver: 12, bronze: 13 },
  { rank: 4,  country: "Austràlia",     flag: "🇦🇺", gold: 18, silver: 19, bronze: 16 },
  { rank: 5,  country: "França",        flag: "🇫🇷", gold: 16, silver: 26, bronze: 22 },
  { rank: 6,  country: "Països Baixos", flag: "🇳🇱", gold: 15, silver: 7,  bronze: 12 },
  { rank: 7,  country: "Gran Bretanya", flag: "🇬🇧", gold: 14, silver: 22, bronze: 29 },
  { rank: 8,  country: "Corea del Sud", flag: "🇰🇷", gold: 13, silver: 9,  bronze: 10 },
  { rank: 9,  country: "Itàlia",        flag: "🇮🇹", gold: 12, silver: 13, bronze: 15 },
  { rank: 10, country: "Alemanya",      flag: "🇩🇪", gold: 12, silver: 13, bronze: 8  }
];

const typeConfig = {
  gold:   { label: "Or",     cls: "gold-icon"   },
  silver: { label: "Plata",  cls: "silver-icon" },
  bronze: { label: "Bronze", cls: "bronze-icon" }
};

const tooltip = document.getElementById("tooltip");
const chart   = document.getElementById("chart");

function makeIcons(d, type) {
  const cfg   = typeConfig[type];
  const count = d[type];
  const frag  = document.createDocumentFragment();

  for (let i = 0; i < count; i++) {
    const icon = document.createElement("span");
    icon.className = `medal-icon ${cfg.cls}`;

    icon.addEventListener("mouseenter", e => {
      tooltip.textContent = `${d.country} · ${cfg.label}: ${count}`;
      tooltip.style.display = "block";
    });
    icon.addEventListener("mousemove", e => {
      tooltip.style.left = (e.clientX + 14) + "px";
      tooltip.style.top  = (e.clientY - 10) + "px";
    });
    icon.addEventListener("mouseleave", () => {
      tooltip.style.display = "none";
    });

    frag.appendChild(icon);
  }
  return frag;
}

data.forEach(d => {
  const total = d.gold + d.silver + d.bronze;

  const row = document.createElement("div");
  row.className = "country-row";

  // Columna esquerra
  row.innerHTML = `
    <div class="country-info">
      <span class="flag">${d.flag}</span>
      <div>
        <div class="country-name">${d.country}</div>
        <div class="rank">#${d.rank}</div>
      </div>
    </div>
  `;

  // Columna dreta
  const iconsArea = document.createElement("div");
  iconsArea.className = "icons-area";

  ["gold", "silver", "bronze"].forEach(type => {
    const group = document.createElement("div");
    group.className = "medal-group";
    group.appendChild(makeIcons(d, type));

    const count = document.createElement("span");
    count.className = "group-count";
    count.textContent = d[type];
    group.appendChild(count);

    iconsArea.appendChild(group);
  });

  const totalLabel = document.createElement("div");
  totalLabel.className = "total-label";
  totalLabel.innerHTML = `Total: <strong>${total}</strong>`;
  iconsArea.appendChild(totalLabel);

  row.appendChild(iconsArea);
  chart.appendChild(row);
});
</script>
</body>
</html>
