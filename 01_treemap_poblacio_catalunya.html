// Parse CSV
const rows = d3.csvParse(csvData, d => ({
  comarca: d.comarca,
  municipality: d.municipality,
  population: +d.population
}));

// Build hierarchy
const byComarca = d3.group(rows, d => d.comarca);
const hierarchyData = {
  name: "Catalunya",
  children: Array.from(byComarca, ([comarca, municipis]) => ({
    name: comarca,
    children: municipis.map(m => ({ name: m.municipality, value: m.population }))
  }))
};

// Layout
const container = document.getElementById("chart");
const width = container.parentElement.clientWidth - 28;
const height = Math.round(width * 0.62);

// 43 colors — mix of qualitative palettes
const palette = [
  "#e63946","#457b9d","#2a9d8f","#e9c46a","#f4a261","#264653","#6a4c93",
  "#1982c4","#8ac926","#ff595e","#6a994e","#bc4749","#3d405b","#81b29a",
  "#f2cc8f","#e07a5f","#3d6b8e","#f8961e","#90be6d","#577590","#43aa8b",
  "#4d908e","#277da1","#f3722c","#f9c74f","#90dbf4","#b5e48c","#d9ed92",
  "#99d98c","#76c893","#52b69a","#168aad","#1a759f","#1e6091","#184e77",
  "#7b2d8b","#c77dff","#e9d8a6","#94d2bd","#0a9396","#ee9b00","#ca6702","#bb3e03"
];

const comarcaList = [...byComarca.keys()].sort();
const colorOf = c => palette[comarcaList.indexOf(c) % palette.length];

const svg = d3.select("#chart").append("svg")
  .attr("width", width).attr("height", height);

const root = d3.hierarchy(hierarchyData)
  .sum(d => d.value)
  .sort((a, b) => b.value - a.value);

d3.treemap()
  .size([width, height])
  .paddingOuter(2)
  .paddingTop(14)
  .paddingInner(1)(root);

// Comarca backgrounds
svg.selectAll(".cb")
  .data(root.children)
  .join("rect").attr("class","cb")
  .attr("x", d => d.x0).attr("y", d => d.y0)
  .attr("width", d => d.x1 - d.x0).attr("height", d => d.y1 - d.y0)
  .attr("fill", d => colorOf(d.data.name)).attr("opacity", 0.15);

// Comarca labels
svg.selectAll(".cl")
  .data(root.children)
  .join("text").attr("class","cl")
  .attr("x", d => d.x0 + 3).attr("y", d => d.y0 + 10)
  .text(d => (d.x1 - d.x0) > 42 ? d.data.name : "")
  .attr("font-size", d => (d.x1 - d.x0) > 110 ? "9.5px" : "7.5px")
  .attr("font-weight", "700")
  .attr("fill", d => colorOf(d.data.name))
  .style("pointer-events","none");

// Municipality rectangles
const tooltip = document.getElementById("tooltip");

svg.selectAll(".mr")
  .data(root.leaves())
  .join("rect").attr("class","mr")
  .attr("x", d => d.x0).attr("y", d => d.y0)
  .attr("width", d => d.x1 - d.x0).attr("height", d => d.y1 - d.y0)
  .attr("fill", d => colorOf(d.parent.data.name))
  .attr("opacity", 0.80).attr("rx", 1)
  .style("cursor","pointer")
  .on("mouseover", function(e, d) {
    d3.select(this).attr("opacity", 1).attr("stroke","white").attr("stroke-width", 1.5);
    const pop = d.data.value.toLocaleString("ca-ES");
    tooltip.style.display = "block";
    tooltip.innerHTML = `<strong>${d.data.name}</strong><br><span style="color:#aaa">${d.parent.data.name}</span><br>Població: <strong>${pop} hab.</strong>`;
  })
  .on("mousemove", function(e) {
    tooltip.style.left = (e.clientX + 14) + "px";
    tooltip.style.top = (e.clientY - 10) + "px";
  })
  .on("mouseout", function() {
    d3.select(this).attr("opacity", 0.80).attr("stroke","none");
    tooltip.style.display = "none";
  });

// Municipality labels (only where there's space)
svg.selectAll(".ml")
  .data(root.leaves())
  .join("text").attr("class","ml")
  .attr("x", d => d.x0 + 2).attr("y", d => d.y0 + 11)
  .text(d => {
    const w = d.x1 - d.x0, h = d.y1 - d.y0;
    return (w > 32 && h > 14) ? d.data.name : "";
  })
  .attr("font-size", d => (d.x1 - d.x0) > 80 ? "9px" : "7px")
  .attr("fill","white").attr("font-weight","500")
  .style("pointer-events","none");

// Legend
const legendEl = document.getElementById("legend");
comarcaList.forEach(c => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `<div class="legend-color" style="background:${colorOf(c)}"></div><span>${c}</span>`;
  legendEl.appendChild(item);
});
</script>
